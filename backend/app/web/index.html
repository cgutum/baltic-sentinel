<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baltic Sentinel — Watch Officer Console</title>
<style>
  :root {
    --bg: #0b1622; --panel: #122234; --panel2: #0e1c2c;
    --line: #1e3650; --text: #dce8f5; --muted: #7e97b3; --accent: #36c2cf;
    --high: #ff5d5d; --med: #ffb13d; --low: #4cc98a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line);
           display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .5px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .wrap { display: grid; grid-template-columns: 380px 1fr; gap: 0; height: calc(100vh - 59px); }
  .col { overflow-y: auto; padding: 18px; }
  .col.left { border-right: 1px solid var(--line); background: var(--panel2); }
  .col-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .col-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
                 color: var(--muted); margin: 0; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 6px; }
  .btn { background: var(--accent); color: #04222a; padding: 7px 12px; font-weight: 600; }
  .btn:hover { filter: brightness(1.1); }
  .btn.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn:disabled { opacity: .5; cursor: default; filter: none; }
  .note { color: var(--muted); font-size: 12px; margin: 8px 0; }

  .vessel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
            padding: 12px; margin-bottom: 10px; }
  .vessel .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .vessel .name { font-weight: 600; }
  .vessel .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .score { font-weight: 700; font-size: 13px; padding: 2px 8px; border-radius: 999px; }
  .reasons { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { font-size: 11px; background: #0c2030; border: 1px solid var(--line);
          color: var(--muted); padding: 2px 8px; border-radius: 999px; }
  .vessel .act { margin-top: 10px; display: flex; justify-content: flex-end; }

  .placeholder { color: var(--muted); text-align: center; margin-top: 80px; font-size: 14px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--line);
             border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
             vertical-align: -3px; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .assessment { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
                padding: 18px; margin-bottom: 18px; }
  .level { display: inline-block; font-weight: 800; letter-spacing: 1px; font-size: 13px;
           padding: 4px 12px; border-radius: 6px; color: #04222a; }
  .level.HIGH { background: var(--high); } .level.MEDIUM { background: var(--med); }
  .level.LOW { background: var(--low); }
  .assessment h3 { margin: 12px 0 6px; font-size: 15px; }
  .assessment ul { margin: 6px 0; padding-left: 20px; color: var(--text); }
  .assessment li { margin: 3px 0; }
  .kv { color: var(--muted); font-size: 12px; }
  .voice { background: var(--panel2); border-left: 3px solid var(--accent); padding: 10px 12px;
           border-radius: 4px; font-style: italic; color: #b9d2ea; margin-top: 6px; }
  .action { background: #2a1a10; border: 1px solid #5a3a1a; border-radius: 6px; padding: 10px 12px;
            margin-top: 10px; color: #ffd9a8; }

  .findings h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
                 color: var(--muted); margin: 0 0 10px; }
  .finding { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
             padding: 12px 14px; margin-bottom: 10px; }
  .finding .fhead { display: flex; justify-content: space-between; align-items: center; }
  .finding .agent { font-weight: 600; color: var(--accent); }
  .sev { font-size: 11px; color: var(--muted); }
  .bar { height: 6px; background: var(--line); border-radius: 4px; margin: 8px 0; overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 4px; }
  .finding p { margin: 6px 0; line-height: 1.45; }
  .evidence { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  footer.disclaimer { color: var(--muted); font-size: 11px; margin-top: 18px; }
</style>
</head>
<body>
  <header>
    <h1>⚓ Baltic Sentinel</h1>
    <span class="sub">Watch Officer Console — undersea cable threat monitor</span>
  </header>

  <div class="wrap">
    <!-- LEFT: candidate vessels -->
    <div class="col left">
      <div class="col-head">
        <h2>Top suspicious vessels</h2>
        <div style="display:flex; gap:6px">
          <button class="btn ghost" id="replay" title="Inject the Eagle S demo track">▶ Replay Eagle S</button>
          <button class="btn ghost" id="refresh">↻ Refresh</button>
        </div>
      </div>
      <div id="source-note" class="note"></div>
      <div id="vessels"></div>
    </div>

    <!-- RIGHT: investigation result -->
    <div class="col right">
      <div id="result">
        <div class="placeholder">Select a vessel and click <b>Investigate</b> to launch a Claude investigation.</div>
      </div>
    </div>
  </div>

<script>
const DEMO_FALLBACK = [{
  mmsi: "518998000", name: "Eagle S", flag: "Cook Islands", suspicion_score: 85,
  suspicion_reasons: ["Slow speed inside Estlink 2 corridor", "Flag of convenience", "Possible shadow-fleet tanker"]
}];

function scoreColor(s) {        // s is 0..100
  if (s >= 70) return "var(--high)";
  if (s >= 40) return "var(--med)";
  return "var(--low)";
}
function levelClass(l) { return (l || "").toUpperCase(); }
function pct(x) { return Math.round((x || 0) * 100); }   // x is 0..1
function esc(s) { return (s ?? "").toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function loadCandidates() {
  const note = document.getElementById("source-note");
  let list = [];
  try {
    const r = await fetch("/vessels");
    const j = await r.json();
    list = (j.vessels || []);
  } catch (e) { /* fall through to demo */ }

  if (!list.length) {
    list = DEMO_FALLBACK;
    note.textContent = "Demo data — no live vessels yet (start the ingest + state_builder workers).";
  } else {
    note.textContent = `Live: ${list.length} vessel(s) — showing top 5 by suspicion score.`;
  }
  list.sort((a, b) => (b.suspicion_score || 0) - (a.suspicion_score || 0));
  renderVessels(list.slice(0, 5));
}

function renderVessels(vessels) {
  const box = document.getElementById("vessels");
  box.innerHTML = "";
  vessels.forEach((v, i) => {
    const s = Math.round(v.suspicion_score || 0);
    const reasons = (v.suspicion_reasons || []).map(r => `<span class="chip">${esc(r)}</span>`).join("");
    const el = document.createElement("div");
    el.className = "vessel";
    el.innerHTML = `
      <div class="top">
        <div>
          <div class="name">#${i + 1} &nbsp;${esc(v.name || v.mmsi)}</div>
          <div class="meta">MMSI ${esc(v.mmsi)} ${v.flag ? "· " + esc(v.flag) : ""}</div>
        </div>
        <span class="score" style="background:${scoreColor(s)};color:#04222a">${s}</span>
      </div>
      <div class="reasons">${reasons}</div>
      <div class="act"><button class="btn" data-mmsi="${esc(v.mmsi)}" data-name="${esc(v.name || v.mmsi)}">Investigate</button></div>`;
    box.appendChild(el);
  });
  box.querySelectorAll("button[data-mmsi]").forEach(b =>
    b.addEventListener("click", () => investigate(b.dataset.mmsi, b.dataset.name)));
}

async function investigate(mmsi, name) {
  const result = document.getElementById("result");
  result.innerHTML = `<div class="placeholder"><span class="spinner"></span>Claude is investigating ${esc(name)}… (this takes a few seconds)</div>`;
  document.querySelectorAll("button[data-mmsi]").forEach(b => b.disabled = true);
  try {
    const r = await fetch(`/agent/investigate/${encodeURIComponent(mmsi)}`, { method: "POST" });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || "investigation failed");
    renderResult(j);
  } catch (e) {
    result.innerHTML = `<div class="placeholder">⚠️ ${esc(e.message)}</div>`;
  } finally {
    document.querySelectorAll("button[data-mmsi]").forEach(b => b.disabled = false);
  }
}

function renderResult(j) {
  const a = j.assessment || {};
  const findings = (j.findings || []).map(f => {
    const sev = pct(f.severity);
    const col = sev >= 70 ? "var(--high)" : sev >= 40 ? "var(--med)" : "var(--low)";
    const ev = (f.evidence || []).map(e => `<span class="chip">${esc(e)}</span>`).join("");
    return `<div class="finding">
      <div class="fhead"><span class="agent">${esc(f.agent)}</span><span class="sev">severity ${sev}%</span></div>
      <div class="bar"><i style="width:${sev}%;background:${col}"></i></div>
      <p>${esc(f.finding)}</p>
      <div class="evidence">${ev}</div>
    </div>`;
  }).join("");

  const reasoning = (a.reasoning || []).map(r => `<li>${esc(r)}</li>`).join("");

  document.getElementById("result").innerHTML = `
    <div class="assessment">
      <span class="level ${levelClass(a.level)}">${esc(a.level || "—")}</span>
      <span class="kv" style="margin-left:10px">confidence ${pct(a.confidence)}% · ${esc(j.vessel?.name || j.mmsi)}</span>
      <h3>${esc(a.summary || "")}</h3>
      <ul>${reasoning}</ul>
      <div class="action"><b>Recommended action:</b> ${esc(a.recommended_action || "")}</div>
      <h3>🔊 Voice briefing</h3>
      <div class="voice">"${esc(a.voice_script || "")}"</div>
    </div>
    <div class="findings">
      <h2>Agent findings (${(j.findings || []).length})</h2>
      ${findings}
    </div>
    <footer class="disclaimer">Decision support only — recommends human escalation, not automatic action.</footer>`;
}

document.getElementById("refresh").addEventListener("click", loadCandidates);
document.getElementById("replay").addEventListener("click", async (e) => {
  const btn = e.target;
  btn.disabled = true; btn.textContent = "▶ Replaying…";
  try {
    await fetch("/replay/eagle-s", { method: "POST" });
    document.getElementById("source-note").textContent =
      "Eagle S replay started — scoring takes a few seconds. Click Refresh shortly.";
    setTimeout(loadCandidates, 6000);   // give state_builder time to score it
  } catch (err) { /* ignore */ }
  finally { btn.disabled = false; btn.textContent = "▶ Replay Eagle S"; }
});
loadCandidates();
</script>
</body>
</html>
